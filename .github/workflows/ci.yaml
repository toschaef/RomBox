name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # os: [macos-latest, windows-latest, ubuntu-latest]
        os: [macos-latest] 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright OS Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install-deps

      - name: Run ESLint
        run: npm run lint

      - name: Build and Package Application
        run: npm run package

      - name: Run Tests (Linux with Xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm test

      - name: Run Tests (macOS & Windows)
        if: matrix.os != 'ubuntu-latest'
        run: npm test

      - name: Upload Coverage Report (Linux)
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload Playwright E2E Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.os }}
          path: test-results/
          retention-days: 14